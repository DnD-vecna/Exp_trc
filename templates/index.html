<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-image: url('https://wallpapercave.com/wp/wp9817310.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        .glass-dark {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-light {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .float { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .toggle-btn {
            padding: 5px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1.5px solid transparent;
            background: rgba(255,255,255,0.3);
            color: #4b5563;
        }
        .toggle-btn.active {
            background: rgba(37, 99, 235, 0.15);
            color: #1d4ed8;
            border-color: rgba(59,130,246,0.5);
        }
    </style>
</head>

<body class="font-sans antialiased text-gray-900 min-h-screen">

<div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>

<div id="login-section" class="min-h-screen flex items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="glass-dark p-8 rounded-2xl w-96 text-center float">
        <h1 class="text-3xl font-bold mb-6 text-white tracking-wide">Expense Tracker</h1>
        <div class="space-y-4">
            <input type="email" id="email-input" placeholder="Email Address" class="w-full px-4 py-3 bg-white/10 border border-white/20 text-white placeholder-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 font-semibold">
            <input type="password" id="pass-input" placeholder="Password" class="w-full px-4 py-3 bg-white/10 border border-white/20 text-white placeholder-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 font-semibold">
            <button id="auth-btn" onclick="handleAuth()" class="w-full bg-blue-500 hover:bg-blue-400 text-white py-3 rounded-xl font-bold shadow-lg">Access Dashboard</button>
            <p class="text-gray-300 text-xs mt-4">
                New user? <button onclick="toggleAuthMode()" id="toggle-auth-text" class="text-blue-400 font-bold hover:underline">Sign Up</button>
            </p>
        </div>
    </div>
</div>

<div id="dashboard-section" class="hidden min-h-screen fade-in pb-10">
    <div class="max-w-7xl mx-auto pt-6 px-6">
        <nav class="glass-light px-6 py-4 flex justify-between items-center rounded-2xl">
            <h1 class="text-xl font-extrabold text-gray-800">Dashboard</h1>
            <div class="flex items-center gap-4 bg-white/40 px-4 py-1.5 rounded-full backdrop-blur-sm">
                <span id="user-email-display" class="text-sm text-blue-600 font-bold"></span>
                <button onclick="logout()" class="text-sm text-red-500 font-bold">Logout</button>
            </div>
        </nav>
    </div>

    <div class="max-w-7xl mx-auto px-6 pt-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="space-y-6 lg:col-span-1">

            <div class="glass-light rounded-2xl p-6">
                <h2 class="text-lg font-bold mb-4 border-b pb-2">Monthly Summary</h2>
                <div class="grid grid-cols-2 gap-4 text-center mb-4">
                    <div class="bg-white/50 rounded-xl p-3 border">
                        <p class="text-xs text-green-600 font-bold">INCOME</p>
                        <p id="sum-income" class="text-xl font-bold text-green-700">0.00</p>
                    </div>
                    <div class="bg-white/50 rounded-xl p-3 border">
                        <p class="text-xs text-red-500 font-bold">SPENT</p>
                        <p id="sum-expense" class="text-xl font-bold text-red-600">0.00</p>
                    </div>
                </div>
                <div class="bg-blue-50/60 rounded-xl p-4 border border-blue-200 text-center">
                    <p id="sum-balance" class="text-3xl font-extrabold text-blue-700">0.00</p>
                </div>
            </div>

            <div class="glass-light rounded-2xl p-6">
                <h2 class="text-lg font-bold mb-4 border-b pb-2">Add Entry</h2>
                <form onsubmit="addTransaction(event)" class="space-y-4">
                    <select id="t-type" class="w-full p-2.5 bg-white/60 border rounded-xl outline-none">
                        <option value="Expense">Expense</option>
                        <option value="Income">Income</option>
                    </select>
                    <input type="text" id="t-cat" required placeholder="Category" class="w-full p-2.5 bg-white/60 border rounded-xl outline-none">
                    <input type="number" id="t-amt" required step="0.01" placeholder="Amount" class="w-full p-2.5 bg-white/60 border rounded-xl outline-none">
                    <input type="date" id="t-date" required class="w-full p-2.5 bg-white/60 border rounded-xl outline-none">
                    <button type="submit" class="w-full bg-gray-900 text-white font-bold py-3 rounded-xl">Save</button>
                </form>
            </div>

        </div>

        <div class="lg:col-span-2 space-y-8">
            <div class="glass-light rounded-2xl p-6 flex flex-col h-[420px]">
                <div class="flex justify-between items-center mb-4 border-b pb-3">
                    <h2 class="text-lg font-bold">History</h2>
                    <button onclick="clearTransactions()" class="text-xs text-red-600 font-bold">Clear All</button>
                </div>
                <div class="overflow-y-auto pr-2">
                    <table class="min-w-full text-left">
                        <tbody id="transaction-table" class="text-sm"></tbody>
                    </table>
                </div>
            </div>

            <div class="glass-light rounded-2xl p-6">
                <canvas id="spendingChart" style="height:260px;"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = "https://pvsegoyevnivyfllqmuv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2c2Vnb3lldm5pdnlmbGxxbXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzAzMjgsImV4cCI6MjA5MDA0NjMyOH0.88nQJAS2k3CVGqPXMCW41tDt3uFpiCfR2ONPJIkWVvE";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const API_URL = "/api";
let authToken = localStorage.getItem("expense_token");
let isSignUp = false;
let spendingChart = null;

window.onload = () => {
    document.getElementById('t-date').valueAsDate = new Date();
    if (authToken) showDashboard();
};

function toggleAuthMode() {
    isSignUp = !isSignUp;
    document.getElementById('auth-btn').innerText = isSignUp ? "Create Account" : "Access Dashboard";
    document.getElementById('toggle-auth-text').innerText = isSignUp ? "Login" : "Sign Up";
}

async function handleAuth() {
    const email = document.getElementById('email-input').value.trim();
    const password = document.getElementById('pass-input').value.trim();
    if (!email || !password) return alert("Enter credentials");

    try {
        let result;
        if (isSignUp) {
            result = await _supabase.auth.signUp({ email, password });
        } else {
            result = await _supabase.auth.signInWithPassword({ email, password });
        }

        if (result.error) {
            alert(result.error.message);
        } else {
            const session = result.data.session;
            if (!session) {
                alert("Check your email for a confirmation link!");
                return;
            }
            localStorage.setItem("expense_token", session.access_token);
            localStorage.setItem("user_email", result.data.user.email);
            authToken = session.access_token;
            showDashboard();
        }
    } catch (e) {
        console.error(e);
        alert("An unexpected error occurred.");
    }
}

function showDashboard() {
    document.getElementById('login-section').classList.add('hidden');
    document.getElementById('dashboard-section').classList.remove('hidden');
    document.getElementById('user-email-display').innerText = localStorage.getItem("user_email");
    loadData();
}

async function loadData() {
    const headers = { "Authorization": `Bearer ${authToken}` };
    try {
        const res = await fetch(`${API_URL}/transactions`, { headers });
        const allTransactions = await res.json();

        const sumRes = await fetch(`${API_URL}/transactions/summary`, { headers });
        const s = await sumRes.json();

        document.getElementById('sum-income').innerText = s.total_income.toFixed(2);
        document.getElementById('sum-expense').innerText = s.total_spent.toFixed(2);
        document.getElementById('sum-balance').innerText = s.balance.toFixed(2);

        document.getElementById('transaction-table').innerHTML = allTransactions.map(t => `
            <tr class="border-b">
                <td class="py-3 px-4">${t.date}</td>
                <td class="py-3 font-bold">${t.category}</td>
                <td class="py-3 text-right font-black ${t.t_type === 'Income' ? 'text-green-600' : 'text-gray-900'}">${t.amount.toFixed(2)}</td>
            </tr>
        `).join('');

        renderChart(allTransactions);
    } catch (e) {
        console.error("Data load error:", e);
    }
}

async function addTransaction(e) {
    e.preventDefault();
    const payload = {
        t_type: document.getElementById('t-type').value,
        category: document.getElementById('t-cat').value,
        amount: parseFloat(document.getElementById('t-amt').value),
        date: document.getElementById('t-date').value
    };

    const res = await fetch(`${API_URL}/transactions`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${authToken}`
        },
        body: JSON.stringify(payload)
    });

    if (res.ok) {
        loadData();
        e.target.reset();
        document.getElementById('t-date').valueAsDate = new Date();
    } else {
        alert("Failed to save");
    }
}

function logout() {
    localStorage.clear();
    location.reload();
}

function renderChart(data) {
    const ctx = document.getElementById('spendingChart').getContext('2d');
    if (spendingChart) spendingChart.destroy();
    spendingChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.slice(0,7).map(t => t.date),
            datasets: [{
                label: 'Amount',
                data: data.slice(0,7).map(t => t.amount),
                borderColor: '#3b82f6',
                tension: 0.4
            }]
        }
    });
}

async function clearTransactions() {
    if (!confirm("Clear all?")) return;
    await fetch(`${API_URL}/transactions`, {
        method: "DELETE",
        headers: { "Authorization": `Bearer ${authToken}` }
    });
    loadData();
}
</script>

</body>
</html>
