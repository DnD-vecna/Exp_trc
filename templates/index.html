<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        {% raw %}
        body {
            background-image: url('https://thumbs.dreamstime.com/b/nice-theme-landscape-anime-background-colors-nice-theme-landscape-anime-background-349420745.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .glass-dark {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-light {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .float { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .toggle-btn {
            padding: 5px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            background: rgba(255,255,255,0.3);
        }
        .toggle-btn.active {
            background: rgba(37, 99, 235, 0.15);
            color: #1d4ed8;
        }
        {% endraw %}
    </style>
</head>

<body class="font-sans antialiased text-gray-900 min-h-screen">

<div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>

<!-- LOGIN -->
<div id="login-section" class="min-h-screen flex items-center justify-center bg-black/40">
    <div class="glass-dark p-8 rounded-2xl w-96 text-center float">
        <h1 class="text-3xl font-bold text-white">Expense Tracker</h1>
        <input id="uid-input" class="w-full mt-4 p-3 rounded-xl" placeholder="Enter UID">
        <button onclick="login()" class="mt-4 w-full bg-blue-500 text-white p-3 rounded-xl">Access</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-section" class="hidden p-6">
    <h1>Dashboard</h1>

    <button onclick="logout()">Logout</button>

    <form onsubmit="addTransaction(event)">
        <select id="t-type">
            <option>Expense</option>
            <option>Income</option>
        </select>
        <input id="t-cat" required>
        <input id="t-amt" type="number" required>
        <input id="t-date" type="date" required>
        <button type="submit">Save</button>
    </form>

    <table>
        <tbody id="transaction-table"></tbody>
    </table>

    <!-- CHART -->
    <div>
        <button id="toggle-week" onclick="setChartRange('week')" class="toggle-btn active">Week</button>
        <button id="toggle-month" onclick="setChartRange('month')" class="toggle-btn">Month</button>
        <button id="toggle-year" onclick="setChartRange('year')" class="toggle-btn">Year</button>
    </div>

    <div style="height:260px;">
        <canvas id="spendingChart"></canvas>
    </div>
</div>

<script>
const API_URL = "/api";

let UID = localStorage.getItem("expense_uid");
let allTransactions = [];
let chartRange = 'week';
let spendingChart = null;

window.onload = () => {
    document.getElementById('t-date').valueAsDate = new Date();
    if (UID) showDashboard();
};

function login() {
    UID = document.getElementById('uid-input').value;
    localStorage.setItem("expense_uid", UID);
    showDashboard();
}

function logout() {
    localStorage.removeItem("expense_uid");
    location.reload();
}

function showDashboard() {
    document.getElementById('login-section').classList.add('hidden');
    document.getElementById('dashboard-section').classList.remove('hidden');
    loadData();
}

async function loadData() {
    const res = await fetch(`${API_URL}/transactions`, { headers: { "X-User-UID": UID } });
    allTransactions = await res.json();

    renderChart();
}

async function addTransaction(e) {
    e.preventDefault();
    const payload = {
        t_type: document.getElementById('t-type').value,
        category: document.getElementById('t-cat').value,
        amount: parseFloat(document.getElementById('t-amt').value),
        date: document.getElementById('t-date').value
    };

    await fetch(`${API_URL}/transactions`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-User-UID": UID },
        body: JSON.stringify(payload)
    });

    loadData();
}

function setChartRange(range) {
    chartRange = range;
    ['week','month','year'].forEach(r=>{
        document.getElementById(`toggle-${r}`).classList.toggle('active', r===range);
    });
    renderChart();
}

function buildChartData() {
    const today = new Date();
    today.setHours(0,0,0,0);

    if(chartRange==='week'){
        const labels=[],exp={},inc={};

        for(let i=6;i>=0;i--){
            const d=new Date(today);
            d.setDate(today.getDate()-i);
            const key=d.toISOString().slice(0,10);
            labels.push(d.toLocaleDateString());
            exp[key]=0; inc[key]=0;
        }

        allTransactions.forEach(t=>{
            if(exp[t.date]!=undefined){
                if(t.t_type==='Expense') exp[t.date]+=t.amount;
                else inc[t.date]+=t.amount;
            }
        });

        return {labels,expenseData:Object.values(exp),incomeData:Object.values(inc)};
    }

    if(chartRange==='month'){
        const buckets={'Wk1':[0,0],'Wk2':[0,0],'Wk3':[0,0],'Wk4':[0,0],'Wk5':[0,0]};
        allTransactions.forEach(t=>{
            const d=new Date(t.date);
            const w=Math.floor((d.getDate()-1)/7);
            if(t.t_type==='Expense') buckets[`Wk${w+1}`][0]+=t.amount;
            else buckets[`Wk${w+1}`][1]+=t.amount;
        });

        const labels=Object.keys(buckets);
        return {
            labels,
            expenseData:labels.map(k=>buckets[k][0]),
            incomeData:labels.map(k=>buckets[k][1])
        };
    }

    const exp=Array(12).fill(0),inc=Array(12).fill(0);
    allTransactions.forEach(t=>{
        const d=new Date(t.date);
        if(t.t_type==='Expense') exp[d.getMonth()]+=t.amount;
        else inc[d.getMonth()]+=t.amount;
    });

    return {labels:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],expenseData:exp,incomeData:inc};
}

function renderChart(){
    const {labels,expenseData,incomeData}=buildChartData();
    const ctx=document.getElementById('spendingChart').getContext('2d');

    if(spendingChart){
        spendingChart.data.labels=labels;
        spendingChart.data.datasets[0].data=expenseData;
        spendingChart.data.datasets[1].data=incomeData;
        spendingChart.update();
        return;
    }

    spendingChart=new Chart(ctx,{
        type:'line',
        data:{
            labels,
            datasets:[
                {label:'Expenses',data:expenseData,borderColor:'#ef4444',tension:0.4},
                {label:'Income',data:incomeData,borderColor:'#22c55e',tension:0.4}
            ]
        }
    });
}
</script>

</body>
</html>
